<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Pedidos | Food Store</title>
  <link rel="stylesheet" href="../../../styles.css" />
  <link rel="stylesheet" href="./orders.css" />
</head>
<body class="client-orders">
  <header class="client-topbar">
    <div class="client-topbar__brand">
      <h1>FoodStore</h1>
    </div>
    <nav class="client-topbar__menu">
      <ul class="client-topbar__menu-list">
        <li><a class="client-topbar__menu-link" href="../../store/home/home.html">Catálogo</a></li>
        <li><a class="client-topbar__menu-link client-topbar__menu-link--active" href="./orders.html">Mis Pedidos</a></li>
        <li><button class="client-topbar__logout" id="logout-btn">Cerrar Sesión</button></li>
      </ul>
    </nav>
  </header>
  
  <main class="orders__container">
    <header class="orders__header">
      <h2 class="orders__title">Historial de Pedidos</h2>
    </header>

    <div id="orders-content">
      <p class="orders__message">Cargando tus pedidos...</p>
    </div>
  </main>

  <!-- TPI: Modal Nativo para el detalle del pedido, que es una estrategia para evitar librerías externas para esta parte -->

  <dialog class="order-modal" id="order-modal">
    <div class="order-modal__content">
      <header class="order-modal__header">
        <h3 class="order-modal__title" id="modal-title">Detalle del Pedido</h3>
        <button class="order-modal__close-btn" id="modal-close-btn">&times;</button>
      </header>
      <div class="order-modal__body" id="modal-body">
        <!-- TPI: Detalles insertados dinamicamente -->
      </div>
    </div>
  </dialog>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
