<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Food Store | Carrito</title>
		<link rel="stylesheet" href="../../../styles.css" /> 
		<link rel="stylesheet" href="./cart.css" />
	</head>
	<body class="store-cart">
		<header class="store-cart__topbar store-cart__topbar--row">
			<div class="store-cart__brand">
				<h1 class="store-cart__logo">FoodStore</h1>
			</div>

			<nav class="store-cart__menu" aria-label="Navegacion principal">
				<ul class="store-cart__menu-list store-cart__menu-list--row">
					<li class="store-cart__menu-item">
						<a class="store-cart__menu-link" href="../home/home.html">Catalogo</a>
					</li>
					<li class="store-cart__menu-item">
						<a class="store-cart__menu-link store-cart__menu-link--active" href="./cart.html" aria-current="page">
							Carrito
							<span class="store-cart__cart-count" id="cart-count">0</span>
						</a>
					</li>
				</ul>
			</nav>
		</header>

		<main class="store-cart__main" aria-labelledby="cart-title">
			<header class="store-cart__header">
				<h2 class="store-cart__title" id="cart-title">Mi Carrito</h2>
			</header>

			<section class="store-cart__content store-cart__content--row" id="cart-content" aria-label="Contenido del carrito">
				<section class="cart-items" id="cart-items-container" aria-label="Productos agregados">
					<ul class="cart-items__list" id="cart-items-list">
						<!-- Los items se cargaran dinamicamente -->
					</ul>
				</section>

				<section class="store-cart__empty" id="cart-empty" aria-label="Carrito vacio" hidden>
					<div class="store-cart__empty-card">
						<p class="store-cart__empty-icon" aria-hidden="true">🛒</p>
						<p class="store-cart__empty-text">Tu carrito esta vacio.</p>
						<a class="store-cart__empty-link" href="../home/home.html">Ver catalogo</a>
					</div>
				</section>

				<aside class="cart-summary" aria-label="Resumen de compra">
					<h3 class="cart-summary__title">Resumen</h3>

					<div class="cart-summary__row cart-summary__row--subtotal">
						<span class="cart-summary__label">Subtotal</span>
						<span class="cart-summary__value" id="cart-subtotal">$0</span>
					</div>

					<div class="cart-summary__row cart-summary__row--total">
						<span class="cart-summary__label cart-summary__label--total">Total</span>
						<strong class="cart-summary__value cart-summary__value--total" id="cart-total">$0</strong>
					</div>

					<div class="cart-summary__row" style="margin-top: 1rem; flex-direction: column; align-items: stretch; gap: 0.5rem;">
						<label for="forma-pago" class="cart-summary__label">Forma de Pago:</label>
						<select id="forma-pago" style="padding: 0.5rem; border: 1px solid var(--clr-surface-border); border-radius: 4px; background: var(--clr-surface-bg); color: var(--clr-text-main);">
							<option value="EFECTIVO">Efectivo</option>
							<option value="MERCADOPAGO">MercadoPago</option>
							<option value="TRANSFERENCIA">Transferencia</option>
							<option value="TARJETA">Tarjeta</option>
						</select>
					</div>

					<button class="cart-summary__checkout-btn" type="button" id="checkout-btn">Finalizar compra</button>
					<p class="cart-summary__note" id="checkout-feedback" style="display: none; color: green; font-weight: bold; text-align: center;">Pedido realizado exitosamente.</p>

					<button class="cart-summary__clear-btn" type="button" id="clear-cart-btn">Vaciar carrito</button>
				</aside>
			</section>
		</main>

		<script type="module" src="./cart.ts"></script>
	</body>
</html>
