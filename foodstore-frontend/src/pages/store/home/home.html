<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store | Catalogo</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body class="store-home">
    <header class="store-home__topbar">
      <div class="store-home__brand">
        <h1 class="store-home__logo">🍕 Food Store</h1>
      </div>

      <nav class="store-home__menu" aria-label="Navegacion principal">
        <ul class="store-home__menu-list">
          <li class="store-home__menu-item"><a class="store-home__menu-link store-home__menu-link--active" href="./home.html">Inicio</a></li>
          <li class="store-home__menu-item"><a class="store-home__menu-link" href="../../client/orders/orders.html">Mis Pedidos</a></li>
          <li class="store-home__menu-item" id="admin-link-container" style="display:none;"><a class="store-home__menu-link" href="../../admin/home/home.html">Administración</a></li>
          <li class="store-home__menu-item">
            <a class="store-home__menu-link" href="../cart/cart.html">
              🛒 Cart <span class="store-home__cart-badge" id="cart-count">0</span>
            </a>
          </li>
          <li class="store-home__menu-item"><span class="store-home__user-name" id="user-name-display">Usuario</span></li>
          <li class="store-home__menu-item"><button class="store-home__logout-btn" id="logout-btn">Cerrar Sesión</button></li>
        </ul>
      </nav>
    </header>

    <div class="store-home__layout">
      <aside class="store-home__sidebar">
        <h2 class="store-home__sidebar-title">Categorías</h2>
        <p class="store-home__sidebar-subtitle">Filtra por categoría</p>
        <ul class="store-home__category-list" id="category-list">
        </ul>
      </aside>

      <main class="store-home__content">
        <div class="store-home__controls">
            <div class="store-home__search-wrapper">
                <span class="search-icon">🔍</span>
                <input class="store-home__search-input" id="search-input" type="search" placeholder="Buscar productos..." autocomplete="off">
            </div>
            <div class="store-home__filters">
                <select class="store-home__select" id="sort-select">
                    <option value="none">Ordenar por</option>
                    <option value="price-asc">Menor precio</option>
                    <option value="price-desc">Mayor precio</option>
                    <option value="name-asc">Nombre A-Z</option>
                </select>
                <select class="store-home__select" id="availability-select">
                    <option value="all">Todos</option>
                    <option value="available">Disponibles</option>
                    <option value="unavailable">Agotados</option>
                </select>
            </div>
        </div>

        <div class="store-home__results-header">
            <h2 class="store-home__section-title">Todos los Productos</h2>
            <p class="store-home__search-feedback" id="search-feedback">Cargando...</p>
        </div>

        <section class="store-home__products">
          <ul class="store-home__product-list" id="products-list"></ul>
        </section>
      </main>
    </div>
    <script type="module" src="./home.ts"></script>
  </body>
</html>
